name: Nightly Visual Matrix

# Phase 0 R5 — visual-rendering matrix runs nightly + on release, never per-PR.
# Per-PR CI runs ifctester only (see ifc-baseline.yml). This workflow is the
# slow / expensive arm: rebuild every fixture's combined-discipline IFC, open
# it in each viewer, capture screenshots, perceptual-diff against the
# committed baseline at tests/baselines/visual-matrix/, and open a GitHub
# issue when SSIM falls below 0.95 on any tile.
#
# The runner script that drives this lives at
#   neobim-ifc-service/scripts/capture_visual_matrix.py
# and is the same script used to refresh the committed baseline. Keeping
# nightly + release + manual-baseline-refresh on a single script means the
# three flows can never drift in subtle ways.

on:
  schedule:
    # 03:00 UTC daily — late evening US west coast, early morning India.
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      ssim_threshold:
        description: "Override SSIM diff threshold (default 0.95)"
        required: false
        default: "0.95"

jobs:
  visual-matrix:
    name: Visual matrix capture + diff
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: neobim-ifc-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: neobim-ifc-service/pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install Pillow scikit-image numpy

      # BlenderBIM (Bonsai) ships as an apt package on recent Ubuntu but the
      # canonical headless path is the Blender CLI + the Bonsai add-on. The
      # capture script falls back to a no-op stub for any viewer it cannot
      # invoke, so this step can be a best-effort install.
      - name: Install Blender (BlenderBIM headless)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y blender || true
          blender --version || echo "blender not installed — script will skip BlenderBIM tile"

      - name: Install Node.js (web-ifc / Puppeteer)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Puppeteer
        run: npm install --no-save puppeteer
        working-directory: ${{ github.workspace }}

      - name: Capture visual matrix
        run: |
          python scripts/capture_visual_matrix.py \
            --fixtures simple_box,multistorey_residential,non_rectangular \
            --viewers blenderbim,fzk,web-ifc \
            --rich-mode full \
            --output tests/baselines/visual-matrix/_nightly

      - name: Perceptual-diff against committed baseline
        id: diff
        run: |
          python scripts/diff_visual_matrix.py \
            --baseline tests/baselines/visual-matrix \
            --candidate tests/baselines/visual-matrix/_nightly \
            --threshold "${{ inputs.ssim_threshold || '0.95' }}" \
            --report nightly-diff-report.json

      - name: Upload diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-visual-matrix-${{ github.run_id }}
          path: |
            neobim-ifc-service/tests/baselines/visual-matrix/_nightly/**
            neobim-ifc-service/nightly-diff-report.json
          retention-days: 14

      - name: Open / update visual-regression issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'neobim-ifc-service/nightly-diff-report.json';
            let body = `Nightly visual matrix detected SSIM regressions.\n\nRun: ${process.env.GITHUB_RUN_ID}\n\n`;
            if (fs.existsSync(path)) {
              const report = JSON.parse(fs.readFileSync(path, 'utf-8'));
              body += '```json\n' + JSON.stringify(report, null, 2).slice(0, 4000) + '\n```';
            }
            const title = `nightly: visual matrix SSIM regression (${new Date().toISOString().slice(0, 10)})`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'visual-matrix-regression',
              state: 'open',
            });
            if (existing.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['visual-matrix-regression', 'phase-0'],
              });
            }
